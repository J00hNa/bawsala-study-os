  <section class="page-title"><span class="kicker">// STUDENT PROFILES</span><h1>بروفايل مستقل لكل طالب.</h1><p class="muted">كل بروفايل له واجباته، دفاتره، مشاكله، جلساته، وحساباته. لا تخلط بيانات طالب بآخر.</p></section>
  <section class="section-sm profile-layout">
    <aside class="card"><div id="activeProfileBox"></div><hr><h2>إضافة طالب</h2><form class="compact-form" id="profileForm"><label class="field"><span>اسم الطالب</span><input name="profileName" required placeholder="مثلاً: أحمد" autocomplete="off"></label><div class="field-row"><label class="field"><span>الصف</span><select name="profileGrade"><option>التوجيهي</option><option>الأول ثانوي</option><option>خريج</option><option>غير محدد</option></select></label><label class="field"><span>المسار</span><select name="profileTrack"><option>علمي</option><option>أدبي</option><option>BTEC</option><option>مهني</option><option>غير محدد</option></select></label></div><div class="field-row"><label class="field"><span>هدف المعدل</span><input name="profileGoal" type="number" min="0" max="100" value="85" autocomplete="off"></label><label class="field"><span>ساعات يومية</span><input name="dailyHours" type="number" min="0" max="14" value="2" autocomplete="off"></label></div><label class="field"><span>أضعف مادة</span><input name="weakSubject" placeholder="رياضيات / إنجليزي / BTEC..." autocomplete="off"></label><label class="field"><span>رمز صغير</span><input name="avatar" maxlength="2" placeholder="◆" autocomplete="off"></label><button class="btn primary full" type="submit">إنشاء البروفايل</button></form></aside>
