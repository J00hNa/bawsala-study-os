name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm audit --audit-level=high
      - uses: actions/upload-artifact@v4
        with:
          name: bawsala-dist
          path: dist
          if-no-files-found: error
